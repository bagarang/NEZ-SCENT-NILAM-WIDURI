<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Manajemen Apps</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LAYER PALING BELAKANG: Background Dinamis -->
  <div id="app-background"></div>

  <!-- CONTAINER UTAMA -->
  <div class="app-layout">
    
    <!-- SIDEBAR MENU -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Menu Utama</h2>
      </div>
      
      <!-- List Menu / Thumbnail -->
      <div class="menu-list">
        <!-- Menu Dashboard -->
        <div class="menu-thumbnail nav-link active" 
             data-page="dashboard" 
             data-bg-url="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1920&q=80" 
             onclick="navigate('dashboard')">
          <div class="menu-content">
            <span>Dashboard</span>
          </div>
        </div>

        <!-- Menu Agen -->
        <div class="menu-thumbnail nav-link" 
             data-page="agen" 
             data-bg-url="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1920&q=80" 
             onclick="navigate('agen')">
          <div class="menu-content">
            <span>Data Agen</span>
          </div>
        </div>

        <!-- Menu Tasks -->
        <div class="menu-thumbnail nav-link" 
             data-page="tasks" 
             data-bg-url="https://images.unsplash.com/photo-1507925922837-326f466362f5?auto=format&fit=crop&w=1920&q=80" 
             onclick="navigate('tasks')">
          <div class="menu-content">
            <span>Daftar Tasks</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
      <header class="top-header">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="header-actions">
          <input type="text" id="crudSearch" placeholder="Cari data..." onkeyup="handleSearch()">
        </div>
      </header>

      <!-- Hasil Render Data / Spinner masuk ke sini -->
      <div id="content">
        <!-- Konten awal saat load -->
      </div>
    </main>
    
  </div>

  <script src="app.js"></script>
</body>
</html>
